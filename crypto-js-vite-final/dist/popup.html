<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加解密数据</title>
  <script type="module" crossorigin src="/assets/popup-BwYVt0e_.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/popup-CWscYVuS.css">
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="title-row">
        <h1>工具箱 v1.0.1</h1>
        <div class="view-mode-toggle">
          <label>
            <input type="radio" name="viewMode" value="popup" checked> 弹窗
          </label>
          <label>
            <input type="radio" name="viewMode" value="sidePanel"> 侧边栏
          </label>
        </div>
      </div>
    </div>
    
    <div class="tabs">
      <button class="tab-btn active" data-tab="tab1">加解密数据</button>
      <button class="tab-btn" data-tab="tab2">文件</button>
      <button class="tab-btn" data-tab="tab3">手机号</button>
    </div>

    <div id="tab1" class="tab-content active">
      <div class="input-section">
        <label for="inputText">输入数据</label>
        <textarea
          id="inputText"
          rows="5"
          placeholder="输入需要加解密的数据"></textarea>
      </div>

      <div class="button-container">
        <button id="llgEncrypt">流量果加密</button>
        <button id="llgDecrypt">流量果解密</button>
        <button id="ytEncrypt">优投加密</button>
        <button id="ytDecrypt">优投解密</button>
        <button id="xmjzEncrypt">小鸣建站加密</button>
        <button id="xmjzDecrypt">小鸣建站解密</button>
        <button id="json">JSON解析</button>
      </div>

      <div class="output-section">
        <label for="outputText">输出结果</label>
        <textarea
          id="outputText"
          rows="5"
          placeholder="输出加解密的数据"></textarea>
      </div>
    </div>

    <div id="tab2" class="tab-content">
      <div class="input-section">
        <h2>图片上传</h2>
        <div class="upload-container">
          <div class="input-wrapper">
            <span class="input-prefix">自定义路径</span>
            <input type="text" id="uploadPath" placeholder="默认: upload" value="upload" />
          </div>
          <input type="file" id="fileInput" accept="image/*" />
          <button id="uploadBtn">上传图片</button>
        </div>
        <div id="uploadStatus" class="upload-status"></div>
      </div>
    </div>

    <div id="tab3" class="tab-content">
      <div class="input-section">
        <h2>手机号工具</h2>
        <div class="phone-tools" style="margin-top: 20px; display: flex; flex-direction: column; gap: 15px;">
          <div class="tool-group" style="display: flex; gap: 10px; align-items: center;">
            <button id="generatePhoneBtn" style="flex: 1; padding: 12px; border-radius: 8px; border: none; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; cursor: pointer; font-weight: 600;">生成随机手机号</button>
            <input type="text" id="generatedPhone" readonly placeholder="点击生成" style="flex: 2; padding: 10px; border-radius: 8px; border: 1px solid #ddd;" />
          </div>
        </div>
      </div>

      <div class="input-section" style="margin-top: 20px;">
        <h2>常用固定手机号</h2>
        <div class="fixed-phones">
          <div id="fixedPhoneList" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px;">
            <!-- JS will populate this -->
          </div>
        </div>
      </div>

      <div class="input-section" style="margin-top: 20px;">
        <h2>运营商选号</h2>
        <div class="carrier-search" style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
          <div style="display: flex; gap: 10px;">
            <select id="provinceSelect" style="flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #ddd; outline: none; transition: border-color 0.2s;">
              <option value="">选择省份</option>
            </select>
            <select id="citySelect" style="flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #ddd; outline: none; transition: border-color 0.2s;" disabled>
              <option value="">选择城市</option>
            </select>
          </div>
          
          <div style="display: flex; gap: 10px;">
            <select id="carrierSelect" style="flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #ddd; outline: none; transition: border-color 0.2s;">
              <option value="">选择运营商</option>
              <option value="ChinaMobile" selected>移动</option>
              <option value="ChinaUnicom">联通</option>
              <option value="ChinaTelecom">电信</option>
              <option value="ChinaBroadnet">广电</option>
            </select>
            <button id="searchPhoneBtn" style="flex: 1; padding: 10px; border-radius: 6px; border: none; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; cursor: pointer; font-weight: 600; transition: opacity 0.2s;">查询号码</button>
          </div>

          <div id="searchResult" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 5px;">
            <!-- Results will be rendered here -->
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
