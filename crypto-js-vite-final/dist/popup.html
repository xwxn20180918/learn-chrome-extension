<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加解密数据</title>
  <script type="module" crossorigin src="/assets/popup-BucN3U4I.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/popup-Cug79qfm.css">
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="title-row">
        <h1>工具箱 v1.0.1</h1>
        <div class="view-mode-toggle">
          <label>
            <input type="radio" name="viewMode" value="popup" checked> 弹窗
          </label>
          <label>
            <input type="radio" name="viewMode" value="sidePanel"> 侧边栏
          </label>
        </div>
      </div>
    </div>
    
    <div class="tabs">
      <button class="tab-btn active" data-tab="tab1">加解密数据</button>
      <button class="tab-btn" data-tab="tab2">文件</button>
      <button class="tab-btn" data-tab="tab3">手机号</button>
      <button class="tab-btn" data-tab="tab4">链接配置</button>
    </div>

    <div id="tab1" class="tab-content active">
      <div class="input-section">
        <label for="inputText">输入数据</label>
        <textarea
          id="inputText"
          rows="5"
          placeholder="输入需要加解密的数据"></textarea>
      </div>

      <div class="button-container">
        <button id="llgEncrypt">流量果加密</button>
        <button id="llgDecrypt">流量果解密</button>
        <button id="llgStrDecrypt">llgstr解密</button>
        <button id="ytEncrypt">优投加密</button>
        <button id="ytDecrypt">优投解密</button>
        <button id="xmjzEncrypt">小鸣建站加密</button>
        <button id="xmjzDecrypt">小鸣建站解密</button>
        <button id="json">JSON解析</button>
      </div>

      <div class="output-section">
        <label for="outputText">输出结果</label>
        <textarea
          id="outputText"
          rows="5"
          placeholder="输出加解密的数据"></textarea>
      </div>
    </div>

    <div id="tab2" class="tab-content">
      <div class="input-section">
        <h2>单张图片上传</h2>
        <div class="upload-container">
          <div class="input-wrapper">
            <span class="input-prefix">自定义路径</span>
            <input type="text" id="uploadPath" placeholder="默认: upload" value="upload" />
          </div>
          <input type="file" id="fileInput" accept="image/*" />
          <button id="uploadBtn">上传图片</button>
        </div>
        <div id="uploadStatus" class="upload-status"></div>
      </div>

      <div class="input-section">
        <h2>批量上传</h2>
        <div class="upload-container">
          <div class="input-wrapper">
            <span class="input-prefix">自定义路径</span>
            <input type="text" id="batchUploadPath" placeholder="默认: upload" value="upload" />
          </div>
          <input type="file" id="batchFileInput" multiple />
          <div id="batchFileSummary" class="batch-file-summary">暂未选择文件</div>
          <button id="batchUploadBtn">批量上传文件</button>
        </div>
        <div id="batchUploadStatus" class="upload-status"></div>
        <div id="batchUploadResult" class="batch-upload-result">
          <div class="section-title-row">
            <label for="batchUploadJson">JSON结果</label>
            <button id="copyBatchJsonBtn" class="small-action-btn" disabled>复制JSON</button>
          </div>
          <textarea
            id="batchUploadJson"
            rows="9"
            readonly
            placeholder="上传完成后输出文件名和URL"></textarea>
          <div id="batchUploadErrors" class="batch-upload-errors"></div>
        </div>
      </div>
    </div>

    <div id="tab3" class="tab-content">
      <div class="input-section">
        <h2>手机号工具</h2>
        <div class="phone-tools" style="margin-top: 20px; display: flex; flex-direction: column; gap: 15px;">
          <div class="tool-group" style="display: flex; gap: 10px; align-items: center;">
            <button id="generatePhoneBtn" style="flex: 1; padding: 12px; border-radius: 8px; border: none; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; cursor: pointer; font-weight: 600;">生成随机手机号</button>
            <input type="text" id="generatedPhone" readonly placeholder="点击生成" style="flex: 2; padding: 10px; border-radius: 8px; border: 1px solid #ddd;" />
          </div>
        </div>
      </div>

      <div class="input-section" style="margin-top: 20px;">
        <h2>常用固定手机号</h2>
        <div class="fixed-phones">
          <div id="fixedPhoneList" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px;">
            <!-- JS will populate this -->
          </div>
        </div>
      </div>

      <div class="input-section" style="margin-top: 20px;">
        <h2>运营商选号</h2>
        <div class="carrier-search" style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
          <div style="display: flex; gap: 10px;">
            <select id="provinceSelect" style="flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #ddd; outline: none; transition: border-color 0.2s;">
              <option value="">选择省份</option>
            </select>
            <select id="citySelect" style="flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #ddd; outline: none; transition: border-color 0.2s;" disabled>
              <option value="">选择城市</option>
            </select>
          </div>
          
          <div style="display: flex; gap: 10px;">
            <select id="carrierSelect" style="flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #ddd; outline: none; transition: border-color 0.2s;">
              <option value="">选择运营商</option>
              <option value="ChinaMobile" selected>移动</option>
              <option value="ChinaUnicom">联通</option>
              <option value="ChinaTelecom">电信</option>
              <option value="ChinaBroadnet">广电</option>
            </select>
            <button id="searchPhoneBtn" style="flex: 1; padding: 10px; border-radius: 6px; border: none; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; cursor: pointer; font-weight: 600; transition: opacity 0.2s;">查询号码</button>
          </div>

          <div id="searchResult" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 5px;">
            <!-- Results will be rendered here -->
          </div>
        </div>
      </div>
    </div>

    <div id="tab4" class="tab-content">
      <div class="input-section">
        <div class="section-title-row">
          <h2>链接配置</h2>
          <button id="refreshCurrentUrl" class="small-action-btn">刷新当前链接</button>
        </div>
        <label for="linkCurrentUrl">当前地址栏URL</label>
        <textarea
          id="linkCurrentUrl"
          rows="4"
          readonly
          placeholder="读取当前浏览器标签页地址栏URL"></textarea>
        <div class="button-container link-action-grid">
          <button id="replaceMacroParamsBtn">替换宏参数</button>
          <button id="parseLandingUrlBtn">解析URL参数</button>
        </div>
        <div id="linkResultSummary" class="link-result-summary is-empty">
          <div class="link-result-main">
            <span id="linkResultBadge" class="link-result-badge">待操作</span>
            <div class="link-result-text">
              <strong id="linkResultTitle">暂无处理结果</strong>
              <span id="linkResultMessage">完成链接操作后，结果会显示在这里。</span>
            </div>
          </div>
          <div id="linkResultUrl" class="link-result-url"></div>
          <button id="copyLinkSummaryBtn" class="small-action-btn link-summary-copy" disabled>复制新URL</button>
        </div>
      </div>

      <div class="input-section">
        <label for="manualParamsInput">手动添加/覆盖参数</label>
        <textarea
          id="manualParamsInput"
          rows="4"
          placeholder="支持一行一个 key=value，也支持 foo=1&bar=2；同名参数会覆盖原值"></textarea>
        <button id="applyManualParamsBtn">应用参数到地址栏</button>
      </div>

      <div class="input-section">
        <label for="linkPrefixSelect">替换链接地址前缀</label>
        <div class="link-prefix-row">
          <select id="linkPrefixSelect"></select>
          <button id="replacePrefixBtn">替换前缀</button>
        </div>
      </div>

      <div class="output-section">
        <div class="section-title-row">
          <label for="linkOutput">详细结果</label>
          <button id="copyLinkResultBtn" class="small-action-btn">复制结果</button>
        </div>
        <textarea
          id="linkOutput"
          rows="5"
          readonly
          placeholder="显示变更前/变更后URL或解析结果"></textarea>
        <div id="linkParamTable" class="link-param-table"></div>
      </div>
    </div>
  </div>
</body>

</html>
